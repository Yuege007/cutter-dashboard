<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>库存预警 Full 预览</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #f3f6fa;
      color: #172033;
      font-family: "PingFang SC", "Microsoft YaHei", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .stage {
      width: min(980px, calc(100vw - 40px));
      padding: 24px;
    }

    .card {
      width: 760px;
      height: 500px;
      display: grid;
      grid-template-rows: auto auto minmax(0, 1fr);
      gap: 14px;
      padding: 20px;
      border: 1px solid rgba(16, 24, 40, 0.1);
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.94);
      box-shadow: 0 18px 45px rgba(15, 23, 42, 0.13);
      overflow: hidden;
      resize: both;
      min-width: 480px;
      min-height: 330px;
      max-width: 100%;
    }

    .topline {
      min-width: 0;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid rgba(148, 163, 184, 0.22);
    }

    .title-block { min-width: 0; }

    h1 {
      margin: 0;
      color: #111827;
      font-size: 18px;
      line-height: 1.2;
      font-weight: 850;
    }

    .subtitle {
      margin-top: 6px;
      overflow: hidden;
      color: #64748b;
      font-size: 12px;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .filter {
      flex: none;
      height: 32px;
      padding: 0 12px;
      border: 1px solid rgba(14, 165, 233, 0.26);
      border-radius: 8px;
      color: #075985;
      background: rgba(240, 249, 255, 0.92);
      font-size: 12px;
      font-weight: 700;
    }

    .metrics {
      min-width: 0;
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
    }

    .metric {
      min-width: 0;
      padding: 12px 14px;
      border: 1px solid rgba(148, 163, 184, 0.16);
      border-radius: 8px;
      background: #f8fafc;
      overflow: hidden;
    }

    .metric strong {
      display: block;
      overflow: hidden;
      font-size: clamp(22px, 4vw, 34px);
      line-height: 1;
      font-weight: 900;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-variant-numeric: tabular-nums;
    }

    .metric span {
      display: block;
      margin-top: 7px;
      overflow: hidden;
      color: #64748b;
      font-size: 12px;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .metric.zero strong { color: #111827; }
    .metric.warn strong { color: #f59e0b; }
    .metric.total strong { color: #0ea5e9; }

    .content {
      min-height: 0;
      min-width: 0;
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(180px, 0.42fr);
      gap: 12px;
      overflow: hidden;
    }

    .panel {
      min-width: 0;
      min-height: 0;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      border: 1px solid rgba(148, 163, 184, 0.16);
      border-radius: 8px;
      overflow: hidden;
      background: #fff;
    }

    .panel-head {
      min-width: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 11px 12px;
      border-bottom: 1px solid rgba(148, 163, 184, 0.16);
      background: #fbfdff;
    }

    .panel-head strong {
      overflow: hidden;
      font-size: 14px;
      font-weight: 850;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .legend {
      flex: none;
      color: #64748b;
      font-size: 11px;
      white-space: nowrap;
    }

    .alarm-list {
      min-height: 0;
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding: 10px;
      overflow: hidden;
    }

    .alarm-row {
      min-width: 0;
      flex: 0 0 clamp(58px, 13vh, 72px);
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 12px;
      padding: 10px 12px;
      border: 1px solid rgba(148, 163, 184, 0.15);
      border-left: 4px solid var(--level);
      border-radius: 8px;
      background: linear-gradient(90deg, rgba(var(--level-rgb), 0.08), #fff 58%);
      overflow: hidden;
    }

    .material-main { min-width: 0; }

    .material-top {
      min-width: 0;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .material-top strong {
      min-width: 0;
      overflow: hidden;
      font-size: 15px;
      font-weight: 850;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .tag {
      flex: none;
      padding: 3px 7px;
      border-radius: 999px;
      color: var(--level);
      background: rgba(var(--level-rgb), 0.12);
      font-size: 11px;
      font-weight: 800;
    }

    .meta {
      margin-top: 5px;
      overflow: hidden;
      color: #64748b;
      font-size: 12px;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .water {
      height: 7px;
      margin-top: 8px;
      overflow: hidden;
      border-radius: 999px;
      background: #e5edf5;
    }

    .water div {
      width: var(--water);
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--level), #38bdf8);
    }

    .numbers {
      min-width: 72px;
      display: grid;
      align-content: center;
      justify-items: end;
      gap: 5px;
      font-variant-numeric: tabular-nums;
    }

    .numbers strong {
      color: #111827;
      font-size: 17px;
      line-height: 1;
      font-weight: 900;
    }

    .numbers span {
      color: #64748b;
      font-size: 11px;
      white-space: nowrap;
    }

    .side {
      min-height: 0;
      min-width: 0;
      display: block;
      gap: 12px;
      overflow: hidden;
    }

    .summary {
      padding: 13px;
      border: 1px solid rgba(148, 163, 184, 0.16);
      border-radius: 8px;
      background: #fff;
    }

    .summary h2 {
      margin: 0 0 10px;
      color: #111827;
      font-size: 14px;
      line-height: 1.2;
      font-weight: 850;
    }

    .summary-line {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 8px;
      padding: 8px 0;
      border-top: 1px solid rgba(148, 163, 184, 0.13);
      font-size: 12px;
    }

    .summary-line span {
      overflow: hidden;
      color: #64748b;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .summary-line strong {
      color: #172033;
      font-weight: 850;
      white-space: nowrap;
    }

    .category-box {
      min-height: 0;
      padding: 13px;
      border: 1px solid rgba(148, 163, 184, 0.16);
      border-radius: 8px;
      background: #fff;
      overflow: hidden;
    }

    .category-box h2 {
      margin: 0 0 10px;
      font-size: 14px;
      font-weight: 850;
    }

    .category-list {
      display: grid;
      gap: 8px;
    }

    .category {
      min-width: 0;
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      align-items: center;
      gap: 8px;
      font-size: 12px;
    }

    .category span,
    .category strong {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .category span { color: #475569; }
    .category strong { color: #111827; font-weight: 850; }

    @media (max-width: 680px) {
      .card {
        width: calc(100vw - 32px);
        min-width: 360px;
        padding: 14px;
      }

      .metrics {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .content {
        grid-template-columns: 1fr;
      }

      .side {
        display: none;
      }
    }
  </style>
</head>
<body>
  <main class="stage">
    <section class="card" aria-label="库存预警 Full 卡片预览">
      <header class="topline">
        <div class="title-block">
          <h1>库存预警</h1>
          <div class="subtitle">按物料维度识别紧缺风险，优先处理断供和严重不足物料</div>
        </div>
        <button class="filter">全部类别</button>
      </header>

      <section class="metrics">
        <div class="metric zero">
          <strong>18</strong>
          <span>断供物料</span>
        </div>
        <div class="metric warn">
          <strong>139</strong>
          <span>低于预警</span>
        </div>
        <div class="metric total">
          <strong>157</strong>
          <span>预警总数</span>
        </div>
      </section>

      <section class="content">
        <article class="panel">
          <div class="panel-head">
            <strong>优先处理物料</strong>
            <span class="legend">当前 / 预警库存</span>
          </div>
          <div class="alarm-list">
            <div class="alarm-row" style="--level:#ef4444;--level-rgb:239,68,68;--water:5%">
              <div class="material-main">
                <div class="material-top">
                  <strong>透明色电焊镜片</strong>
                  <span class="tag">断供</span>
                </div>
                <div class="meta">劳保用品 / 规格 8#</div>
                <div class="water"><div></div></div>
              </div>
              <div class="numbers">
                <strong>0 / 20</strong>
                <span>差值 -20</span>
              </div>
            </div>

            <div class="alarm-row" style="--level:#f59e0b;--level-rgb:245,158,11;--water:18%">
              <div class="material-main">
                <div class="material-top">
                  <strong>麦拉</strong>
                  <span class="tag">低于预警</span>
                </div>
                <div class="meta">耗材 / 绝缘材料</div>
                <div class="water"><div></div></div>
              </div>
              <div class="numbers">
                <strong>2 / 11</strong>
                <span>差值 -9</span>
              </div>
            </div>

            <div class="alarm-row" style="--level:#f59e0b;--level-rgb:245,158,11;--water:35%">
              <div class="material-main">
                <div class="material-top">
                  <strong>十字小螺丝</strong>
                  <span class="tag">低于预警</span>
                </div>
                <div class="meta">紧固件 / M2.5</div>
                <div class="water"><div></div></div>
              </div>
              <div class="numbers">
                <strong>35 / 100</strong>
                <span>差值 -65</span>
              </div>
            </div>

            <div class="alarm-row" style="--level:#f59e0b;--level-rgb:245,158,11;--water:48%">
              <div class="material-main">
                <div class="material-top">
                  <strong>工具A</strong>
                  <span class="tag">低于预警</span>
                </div>
                <div class="meta">工具类 / 通用</div>
                <div class="water"><div></div></div>
              </div>
              <div class="numbers">
                <strong>24 / 50</strong>
                <span>差值 -26</span>
              </div>
            </div>
          </div>
        </article>

        <aside class="side">
          <section class="category-box">
            <h2>类别分布</h2>
            <div class="category-list">
              <div class="category"><span>耗材</span><strong>52</strong></div>
              <div class="category"><span>工具类</span><strong>38</strong></div>
              <div class="category"><span>劳保用品</span><strong>31</strong></div>
              <div class="category"><span>紧固件</span><strong>24</strong></div>
            </div>
          </section>
        </aside>
      </section>
    </section>
  </main>
</body>
</html>
